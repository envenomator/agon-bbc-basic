RAM_START = 0x040000;                                      /* MOS load address */
RAM_END   = 0x0B0000;                                      /* Start of MOSLET memory area */
RAM_SIZE  = RAM_END - RAM_START;
STACKTOP  = 0xB80000;                                      /* end of on-chip RAM area  */

ENTRY(AGON_START)

MEMORY {
    USERRAM (rw) : ORIGIN = RAM_START, LENGTH = RAM_SIZE  /* Define RAM region */
}

SECTIONS {
    . = RAM_START;

    .init : { *(.init) } > USERRAM

    .text : { *(.text) } > USERRAM

    .data : { *(.data) } > USERRAM

    .bss (NOLOAD): {
        bss_start = .;
        *(.bss-1st)
        *(.bss)
        *(.bss-end)
        bss_end = .;
    } > USERRAM
}

bss_size = SIZEOF(.bss);
